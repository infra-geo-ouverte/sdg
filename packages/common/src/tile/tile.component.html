@let message = this.message();
@let icon = this.icon();
@let iconSvg = this.iconSvg();

<button
  class="sdg-tile-container"
  [class.--with-message]="message"
  [class.--with-icon]="icon || iconSvg"
  (click)="goToLink()"
>
  <div class="sdg-tile-content">
    <div class="sdg-tile-title-container">
      @if (icon) {
        <mat-icon class="sdg-tile-icon">{{ icon }}</mat-icon>
      } @else if (iconSvg) {
        <mat-icon class="sdg-tile-icon" [svgIcon]="iconSvg" />
      }
      <span class="sdg-tile-title">
        <b> {{ title() }} </b>
      </span>
    </div>
    @if (message) {
      <div class="sdg-tile-message">{{ message }}</div>
    }
  </div>

  <div class="sdg-tile-arrow-container">
    <mat-icon class="sdg-tile-arrow" color="accent">
      <!-- icon name: arrow_right_alt -->
      <svg viewBox="0 -960 960 960">
        <path
          d="m560-240-56-58 142-142H160v-80h486L504-662l56-58 240 240-240 240Z"
        />
      </svg>
    </mat-icon>
  </div>
</button>
