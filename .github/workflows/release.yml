# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions
#

name: Release
on:
  push:
    branches:
      - main
      - next
      - ^[0-9]+(.[0-9]+)?.x$

permissions:
  id-token: write # Required for OIDC
  contents: read
  # Allow workflows to publish to GitHub Pages when invoking reusable workflows
  pages: write

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # to enable use of OIDC for npm provenance
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Security
        run: npm audit --omit dev && npm audit signatures

      - name: Quality
        run: npm run circular-deps & npm run lint

      - name: Install Playwright dependencies
        run: npx playwright install --with-deps chromium

      - name: Test
        run: npm run test.ci

      - name: Build demo
        run: npm run build -w demo

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: npx semantic-release

  deploy-gh-pages:
    name: Deploy demo content to Pages
    needs: release
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/deploy-gh-page.yml
