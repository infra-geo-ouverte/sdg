<label
  [for]="controlId()"
  class="form-field-label-label"
  [class.--disabled]="disabled()"
  >{{ label() }}
  @if (required()) {
    <span class="form-field-label-asterisk">*</span>
  }
</label>
@if (clarification()) {
  <label
    [for]="controlId()"
    class="form-field-label-clarification"
    [class.--disabled]="disabled()"
    >{{ clarification() }}</label
  >
}
